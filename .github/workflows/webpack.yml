name: Webpack CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Node 环境
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建（Webpack）
      - name: Build project
        run: npm run build

      # 5. 上传构建产物
      - name: Upload dist
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: dist
